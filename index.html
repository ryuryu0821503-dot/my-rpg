<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勇者RPG</title>
<style>
body{
    margin:0;
    background:#222;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
    font-family:sans-serif;
}

canvas{
    display:block;
    margin:auto;
    background:#4caf50;
}
</style>
</head>
<body>

<div id="ui">
    Lv:<span id="lv">1</span>
    HP:<span id="hp">100</span>
</div>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player={
    x:100,
    y:100,
    size:32,
    hp:100,
    level:1,
    exp:0,
    atk:10
};

const enemy={
    x:500,
    y:300,
    size:32,
    hp:50
};

const keys={};

document.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.code==="Space"){
        attack();
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

function attack(){

    let dx=player.x-enemy.x;
    let dy=player.y-enemy.y;

    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<60){

        enemy.hp-=player.atk;

        if(enemy.hp<=0){

            player.exp+=10;

            if(player.exp>=player.level*20){
                player.level++;
                player.hp+=20;
                player.atk+=5;
            }

            enemy.hp=50+player.level*20;
            enemy.x=Math.random()*700+50;
            enemy.y=Math.random()*500+50;
        }
    }
}

function update(){

    if(keys["ArrowUp"]) player.y-=4;
    if(keys["ArrowDown"]) player.y+=4;
    if(keys["ArrowLeft"]) player.x-=4;
    if(keys["ArrowRight"]) player.x+=4;

    document.getElementById("lv").textContent=player.level;
    document.getElementById("hp").textContent=player.hp;
}

function draw(){

    ctx.clearRect(0,0,800,600);

    for(let x=0;x<25;x++){
        for(let y=0;y<19;y++){

            ctx.fillStyle=(x+y)%2?
            "#6ab04c":
            "#7bed9f";

            ctx.fillRect(
                x*32,
                y*32,
                32,
                32
            );
        }
    }

    ctx.fillStyle="blue";
    ctx.fillRect(
        player.x,
        player.y,
        player.size,
        player.size
    );

    ctx.fillStyle="red";
    ctx.fillRect(
        enemy.x,
        enemy.y,
        enemy.size,
        enemy.size
    );

    ctx.fillStyle="white";
    ctx.fillText(
        "SPACEで攻撃",
        10,
        580
    );
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
